<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
body { margin:0; overflow:hidden; background:#111; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display:block; cursor: crosshair; }

#ui {
    position: fixed;
    top: 10px;
    left: 10px;
    color: white;
    background: rgba(0,0,0,0.6);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14px;
    pointer-events: none;
    z-index: 10;
}

#ping {
    position: fixed;
    top: 10px;
    right: 10px;
    color: white;
    background: rgba(0,0,0,0.6);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    pointer-events: none;
    z-index: 10;
}

#health {
    position: fixed;
    bottom: 20px;
    left: 20px;
    width: 200px;
    height: 20px;
    background: rgba(0,0,0,0.7);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #fff;
    z-index: 10;
}

#healthBar {
    width: 100%;
    height: 100%;
    background: #ff3333;
    transition: width 0.2s;
}

#healthText {
    position: absolute;
    width: 100%;
    text-align: center;
    line-height: 20px;
    color: white;
    font-weight: bold;
    font-size: 12px;
    text-shadow: 1px 1px 0 black;
}

#controlsInfo {
    position: fixed;
    bottom: 10px;
    right: 10px;
    color: white;
    background: rgba(0,0,0,0.5);
    padding: 5px 10px;
    border-radius: 5px;
    font-size: 12px;
    pointer-events: none;
}

.damageNumber {
    position: absolute;
    font-weight: bold;
    font-size: 18px;
    text-shadow: 1px 1px 0 black;
    animation: floatUp 0.8s forwards;
    pointer-events: none;
    z-index: 20;
}

@keyframes floatUp {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-40px); }
}

#respawnMessage {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(8px);
    color: white;
    padding: 24px 48px;
    border-radius: 24px;
    text-align: center;
    z-index: 100;
    display: none;
    font-family: 'Segoe UI', system-ui, monospace;
    letter-spacing: 1px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.2);
}

#respawnText {
    font-size: 20px;
    font-weight: 400;
    margin-bottom: 12px;
    opacity: 0.9;
}

#respawnCountdown {
    font-size: 64px;
    font-weight: 700;
    line-height: 1;
    text-shadow: 0 0 10px rgba(255,255,255,0.6);
    color: #ffaa44;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
    <div>🏆 Jugadores vivos: <span id="aliveCount">0</span></div>
</div>
<div id="ping">
    📡 Ping: <span id="pingValue">0</span> ms
</div>
<div id="health">
    <div id="healthBar"></div>
    <div id="healthText">100 HP</div>
</div>
<div id="controlsInfo">
    🖱️ WASD o arrastrar | 💥 Colisión = combate automático
</div>
<div id="respawnMessage">
    <div id="respawnText">Reapareciendo en</div>
    <div id="respawnCountdown">5</div>
</div>

<script>
(function() {
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    let myId = null;
    let players = {};
    let serverPlayers = {};
    let zone = { x: 800, y: 800, radius: 700 };
    let aliveCount = 0;
    let localPlayerHealth = 100;
    let lastAttackTime = 0;
    let attackCooldown = 0.8;

    // --- Sistema de teclas con conjunto activo ---
    const activeKeys = new Set();
    let input = { dx: 0, dy: 0 };

    function updateInputFromActiveKeys() {
        let dx = 0, dy = 0;
        if (activeKeys.has('KeyW') || activeKeys.has('ArrowUp')) dy -= 1;
        if (activeKeys.has('KeyS') || activeKeys.has('ArrowDown')) dy += 1;
        if (activeKeys.has('KeyA') || activeKeys.has('ArrowLeft')) dx -= 1;
        if (activeKeys.has('KeyD') || activeKeys.has('ArrowRight')) dx += 1;
        input.dx = dx;
        input.dy = dy;
    }
    // ------------------------------------------------

    let deathTime = null;

    let pingHistory = [];
    const PING_HISTORY_LEN = 5;

    const SPRITE_URL = "ch003.png";
    const TOTAL_IMAGE_SIZE = 128;
    const TILES_PER_ROW = 4;
    const TILE_SIZE = TOTAL_IMAGE_SIZE / TILES_PER_ROW;

    const SPRITE_SCALE = 48 / TILE_SIZE;
    const SPRITE_W = TILE_SIZE * SPRITE_SCALE;
    const SPRITE_H = TILE_SIZE * SPRITE_SCALE;

    const CROP_LEFT = 0;
    const CROP_TOP = 0;
    const CROP_WIDTH = TILE_SIZE - CROP_LEFT;
    const CROP_HEIGHT = TILE_SIZE - CROP_TOP;

    let spriteSheet = new Image();
    let spriteLoaded = false;
    spriteSheet.onload = () => { spriteLoaded = true; };
    spriteSheet.src = SPRITE_URL;

    const DIRECTION_TO_ROW = {
        down: 0,
        up: 1,
        left: 2,
        right: 3
    };

    // Duración fija por frame (igual al valor por defecto anterior)
    const ANIM_FRAME_DURATION = 0.25; // segundos

    let playerAnim = {};

    function getPlayerColor(id, isMe, serverColor) {
        if (isMe) return "#88ff88";
        if (serverColor) return serverColor;
        let hash = 0;
        for (let i = 0; i < id.length; i++) {
            hash = ((hash << 5) - hash) + id.charCodeAt(i);
            hash |= 0;
        }
        const hue = Math.abs(hash % 360);
        return `hsl(${hue}, 70%, 55%)`;
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    const ws = new WebSocket(location.origin.replace("http", "ws"));

    ws.onmessage = (msg) => {
        const data = JSON.parse(msg.data);
        
        if (data.type === 'init') {
            myId = data.id;
        }
        else if (data.type === 'state') {
            serverPlayers = data.players;
            zone = data.zone;
            aliveCount = data.aliveCount;
            
            if (myId && serverPlayers[myId]) {
                localPlayerHealth = serverPlayers[myId].health;
                const percent = Math.max(0, (localPlayerHealth / 100) * 100);
                const healthBar = document.getElementById('healthBar');
                const healthText = document.getElementById('healthText');
                if (healthBar) healthBar.style.width = percent + '%';
                if (healthText) healthText.innerText = `${Math.floor(localPlayerHealth)} HP`;
                lastAttackTime = serverPlayers[myId].lastAttackTime;
            }
            const aliveCountSpan = document.getElementById('aliveCount');
            if (aliveCountSpan) aliveCountSpan.innerText = aliveCount;
            
            if (data.timestamp) {
                let rawPing = Date.now() - data.timestamp;
                if (rawPing < 0) rawPing = 0;
                pingHistory.push(rawPing);
                if (pingHistory.length > PING_HISTORY_LEN) pingHistory.shift();
                const avgPing = Math.round(pingHistory.reduce((a,b) => a+b, 0) / pingHistory.length);
                const pingSpan = document.getElementById('pingValue');
                if (pingSpan) pingSpan.innerText = avgPing;
            }
        }
        else if (data.type === 'damage') {
            if (data.target === myId) {
                showDamageNumber(data.damage, true);
            } else if (data.from === myId) {
                showDamageNumber(data.damage, false, data.target);
            }
        }
    };

    function showDamageNumber(damage, isMe, targetId) {
        const div = document.createElement('div');
        div.className = 'damageNumber';
        div.textContent = `-${damage}`;
        div.style.color = isMe ? '#ff8888' : '#ffaa44';
        div.style.left = (isMe ? canvas.width/2 : canvas.width/2 + (Math.random() - 0.5) * 100) + 'px';
        div.style.top = (isMe ? canvas.height/2 : canvas.height/2 + (Math.random() - 0.5) * 80) + 'px';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 800);
    }

    // --- Manejo de teclas ---
    document.addEventListener("keydown", (e) => {
        const code = e.code;
        if (code === 'KeyW' || code === 'KeyS' || code === 'KeyA' || code === 'KeyD' ||
            code === 'ArrowUp' || code === 'ArrowDown' || code === 'ArrowLeft' || code === 'ArrowRight') {
            e.preventDefault();
            if (!activeKeys.has(code)) {
                activeKeys.add(code);
                updateInputFromActiveKeys();
            }
        }
    });
    document.addEventListener("keyup", (e) => {
        const code = e.code;
        if (code === 'KeyW' || code === 'KeyS' || code === 'KeyA' || code === 'KeyD' ||
            code === 'ArrowUp' || code === 'ArrowDown' || code === 'ArrowLeft' || code === 'ArrowRight') {
            e.preventDefault();
            if (activeKeys.has(code)) {
                activeKeys.delete(code);
                updateInputFromActiveKeys();
            }
        }
    });
    // ------------------------------------------------

    let startX = 0, startY = 0;
    canvas.addEventListener("touchstart", (e) => {
        e.preventDefault();
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
    });
    canvas.addEventListener("touchmove", (e) => {
        e.preventDefault();
        let dx = e.touches[0].clientX - startX;
        let dy = e.touches[0].clientY - startY;
        let mag = Math.hypot(dx, dy) || 1;
        input.dx = dx / mag;
        input.dy = dy / mag;
    });
    canvas.addEventListener("touchend", (e) => {
        e.preventDefault();
        input.dx = 0;
        input.dy = 0;
    });

    setInterval(() => {
        if (ws.readyState === 1 && myId) {
            ws.send(JSON.stringify({ type: "move", dx: input.dx, dy: input.dy }));
        }
    }, 30);

    function interpolateAll() {
        for (let id in serverPlayers) {
            const sp = serverPlayers[id];
            if (!players[id]) {
                players[id] = { ...sp };
                playerAnim[id] = {
                    frame: 1,
                    directionRow: 0,
                    moving: false,
                    lastVisualX: sp.x,
                    lastVisualY: sp.y,
                    nextFrameTime: performance.now() / 1000 + ANIM_FRAME_DURATION,
                    idleCounter: 0
                };
            } else {
                players[id].x += (sp.x - players[id].x) * 0.7;
                players[id].y += (sp.y - players[id].y) * 0.7;
                players[id].health = sp.health;
                players[id].color = sp.color;
                players[id].alive = sp.alive;
                players[id].lastAttackTime = sp.lastAttackTime;
            }
        }
    }

    function getDirectionFromMovement(dx, dy) {
        if (Math.abs(dx) > Math.abs(dy)) {
            return dx > 0 ? 'right' : 'left';
        } else if (Math.abs(dy) > 0) {
            return dy > 0 ? 'down' : 'up';
        }
        return null;
    }

    function getDirectionFromInput(dx, dy) {
        if (dx === 0 && dy === 0) return null;
        if (Math.abs(dx) > Math.abs(dy)) {
            return dx > 0 ? 'right' : 'left';
        } else {
            return dy > 0 ? 'down' : 'up';
        }
    }

    function updateAnimations() {
        const now = performance.now() / 1000;
        for (let id in players) {
            const p = players[id];
            if (!p.alive) continue;

            const anim = playerAnim[id];
            if (!anim) continue;

            const isLocal = (id === myId);
            let newDirection = null;
            let isMoving = false;

            if (isLocal) {
                // Jugador local: dirección según teclas
                const hasInput = (input.dx !== 0 || input.dy !== 0);
                if (hasInput) {
                    isMoving = true;
                    newDirection = getDirectionFromInput(input.dx, input.dy);
                } else {
                    isMoving = false;
                }
                // Actualizar última posición visual (no se usa para dirección local, pero mantenemos)
                anim.lastVisualX = p.x;
                anim.lastVisualY = p.y;
            } else {
                // Otros jugadores: dirección por desplazamiento visual
                const deltaX = p.x - anim.lastVisualX;
                const deltaY = p.y - anim.lastVisualY;
                const distance = Math.hypot(deltaX, deltaY);
                anim.lastVisualX = p.x;
                anim.lastVisualY = p.y;

                const MOVEMENT_THRESHOLD = 0.5;
                const DIRECTION_THRESHOLD = 2.0;
                isMoving = distance > MOVEMENT_THRESHOLD;
                if (distance > DIRECTION_THRESHOLD) {
                    newDirection = getDirectionFromMovement(deltaX, deltaY);
                }
            }

            // Manejo de idleCounter para transición suave
            if (isMoving) {
                anim.idleCounter = 0;
                if (!anim.moving) {
                    anim.moving = true;
                    anim.frame = 0;
                    anim.nextFrameTime = now + ANIM_FRAME_DURATION;
                }
            } else {
                if (anim.moving) {
                    anim.idleCounter++;
                    if (anim.idleCounter >= 3) {
                        anim.moving = false;
                        anim.frame = 1; // frame idle
                    }
                }
            }

            // Cambiar dirección si es necesario
            if (newDirection !== null) {
                const newRow = DIRECTION_TO_ROW[newDirection];
                if (anim.directionRow !== newRow) {
                    anim.directionRow = newRow;
                    if (anim.moving) {
                        anim.frame = 0;
                        anim.nextFrameTime = now + ANIM_FRAME_DURATION;
                    }
                }
            }

            // Avanzar frames si está en movimiento y ha pasado el tiempo
            if (anim.moving && now >= anim.nextFrameTime) {
                anim.frame = (anim.frame + 1) % 4;
                anim.nextFrameTime = now + ANIM_FRAME_DURATION;
            }
        }
    }

    function drawGround(camX, camY) {
        ctx.fillStyle = "#e0b05a";
        ctx.fillRect(camX, camY, canvas.width, canvas.height);
        
        const gridSpacing = 80;
        const startX = Math.floor(camX / gridSpacing) * gridSpacing;
        const startY = Math.floor(camY / gridSpacing) * gridSpacing;
        
        ctx.fillStyle = "#c99a3a";
        for (let x = startX; x < camX + canvas.width + gridSpacing; x += gridSpacing) {
            for (let y = startY; y < camY + canvas.height + gridSpacing; y += gridSpacing) {
                ctx.beginPath();
                ctx.arc(x, y, 2.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const localPlayer = players[myId];
        if (!localPlayer) return;
        
        let camX = localPlayer.x - canvas.width / 2;
        let camY = localPlayer.y - canvas.height / 2;
        
        ctx.save();
        ctx.translate(-camX, -camY);
        
        drawGround(camX, camY);
        
        ctx.beginPath();
        ctx.arc(zone.x, zone.y, zone.radius, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(0, 150, 200, 0.25)";
        ctx.fill();
        ctx.strokeStyle = "rgba(0, 200, 255, 0.9)";
        ctx.lineWidth = 4;
        ctx.stroke();
        
        ctx.beginPath();
        ctx.arc(zone.x, zone.y, zone.radius + 5, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(255, 0, 0, 0.4)";
        ctx.stroke();
        
        for (let id in players) {
            const p = players[id];
            if (!p.alive) continue;
            
            const isMe = (id === myId);
            const anim = playerAnim[id] || { frame: 1, directionRow: 0 };
            
            const row = anim.directionRow;
            const frameCol = anim.frame;
            
            if (spriteLoaded) {
                const srcX = frameCol * TILE_SIZE + CROP_LEFT;
                const srcY = row * TILE_SIZE + CROP_TOP;
                const srcW = CROP_WIDTH;
                const srcH = CROP_HEIGHT;
                const destX = p.x - SPRITE_W/2;
                const destY = p.y - SPRITE_H/2;
                ctx.drawImage(spriteSheet, srcX, srcY, srcW, srcH, destX, destY, SPRITE_W, SPRITE_H);
            } else {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 14, 0, Math.PI * 2);
                ctx.fillStyle = getPlayerColor(id, isMe, p.color);
                ctx.fill();
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            
            const healthPercent = p.health / 100;
            const barWidth = 30;
            const barHeight = 6;
            const barX = p.x - barWidth / 2;
            const barY = p.y - SPRITE_H/2 - 10;
            ctx.fillStyle = "#333";
            ctx.fillRect(barX, barY, barWidth, barHeight);
            ctx.fillStyle = "#ff3333";
            ctx.fillRect(barX, barY, barWidth * healthPercent, barHeight);
            
            ctx.font = "12px Arial";
            ctx.fillStyle = "white";
            ctx.shadowBlur = 2;
            ctx.fillText(isMe ? "Tú" : `P${id.substring(0,4)}`, p.x - 12, p.y - SPRITE_H/2 - 12);
            
            if (isMe && lastAttackTime) {
                const now = Date.now() / 1000;
                const cooldownRemaining = Math.max(0, attackCooldown - (now - lastAttackTime));
                if (cooldownRemaining > 0) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, SPRITE_W/2 + 3, 0, Math.PI * 2 * (1 - cooldownRemaining / attackCooldown));
                    ctx.strokeStyle = "#ffaa44";
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
            }
        }
        
        ctx.restore();
        
        ctx.font = "bold 14px monospace";
        ctx.fillStyle = "white";
        ctx.shadowBlur = 2;
        ctx.fillText(`🌊 Zona segura: ${Math.floor(zone.radius)}m`, 20, 70);
        if (zone.radius < 300) {
            ctx.fillStyle = "#ff8888";
            ctx.fillText("⚠️ LA ISLA SE HUNDE RÁPIDO ⚠️", 20, 100);
        }
    }

    function updateRespawnMessage() {
        const localPlayer = players[myId];
        const msgDiv = document.getElementById('respawnMessage');
        const countdownSpan = document.getElementById('respawnCountdown');
        
        if (!localPlayer) return;
        
        if (!localPlayer.alive) {
            if (deathTime === null) deathTime = Date.now();
            const elapsed = (Date.now() - deathTime) / 1000;
            let remaining = Math.max(0, Math.ceil(5 - elapsed));
            if (countdownSpan) countdownSpan.innerText = remaining;
            if (msgDiv) msgDiv.style.display = 'block';
        } else {
            if (deathTime !== null) deathTime = null;
            if (msgDiv) msgDiv.style.display = 'none';
        }
    }

    function gameLoop() {
        requestAnimationFrame(gameLoop);
        interpolateAll();
        updateAnimations();
        draw();
        updateRespawnMessage();
    }
    gameLoop();
})();
</script>
</body>
</html>
