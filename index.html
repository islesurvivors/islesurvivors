<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
body { margin:0; overflow:hidden; background:#111; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display:block; cursor: crosshair; }

#ui {
    position: fixed;
    top: 10px;
    left: 10px;
    color: white;
    background: rgba(0,0,0,0.6);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14px;
    pointer-events: none;
    z-index: 10;
}

#ping {
    position: fixed;
    top: 10px;
    right: 10px;
    color: white;
    background: rgba(0,0,0,0.6);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    pointer-events: none;
    z-index: 10;
}

#health {
    position: fixed;
    bottom: 20px;
    left: 20px;
    width: 200px;
    height: 20px;
    background: rgba(0,0,0,0.7);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #fff;
    z-index: 10;
}

#healthBar {
    width: 100%;
    height: 100%;
    background: #ff3333;
    transition: width 0.2s;
}

#healthText {
    position: absolute;
    width: 100%;
    text-align: center;
    line-height: 20px;
    color: white;
    font-weight: bold;
    font-size: 12px;
    text-shadow: 1px 1px 0 black;
}

#controlsInfo {
    position: fixed;
    bottom: 10px;
    right: 10px;
    color: white;
    background: rgba(0,0,0,0.5);
    padding: 5px 10px;
    border-radius: 5px;
    font-size: 12px;
    pointer-events: none;
}

#animSpeedControl {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(0,0,0,0.7);
    padding: 8px 12px;
    border-radius: 8px;
    color: white;
    font-size: 12px;
    z-index: 20;
    display: flex;
    gap: 10px;
    align-items: center;
    pointer-events: auto;
}
#animSpeedControl input {
    width: 200px;
    cursor: pointer;
}
#animSpeedValue {
    min-width: 55px;
    text-align: center;
}

#debugAnim {
    position: fixed;
    bottom: 80px;
    left: 20px;
    background: rgba(0,0,0,0.7);
    padding: 4px 10px;
    border-radius: 8px;
    color: #ffaa44;
    font-family: monospace;
    font-size: 14px;
    pointer-events: none;
    z-index: 20;
}

.damageNumber {
    position: absolute;
    font-weight: bold;
    font-size: 18px;
    text-shadow: 1px 1px 0 black;
    animation: floatUp 0.8s forwards;
    pointer-events: none;
    z-index: 20;
}

@keyframes floatUp {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-40px); }
}

#respawnMessage {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(8px);
    color: white;
    padding: 24px 48px;
    border-radius: 24px;
    text-align: center;
    z-index: 100;
    display: none;
    font-family: 'Segoe UI', system-ui, monospace;
    letter-spacing: 1px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.2);
}

#respawnText {
    font-size: 20px;
    font-weight: 400;
    margin-bottom: 12px;
    opacity: 0.9;
}

#respawnCountdown {
    font-size: 64px;
    font-weight: 700;
    line-height: 1;
    text-shadow: 0 0 10px rgba(255,255,255,0.6);
    color: #ffaa44;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
    <div>🏆 Jugadores vivos: <span id="aliveCount">0</span></div>
</div>
<div id="ping">
    📡 Ping: <span id="pingValue">0</span> ms
</div>
<div id="health">
    <div id="healthBar"></div>
    <div id="healthText">100 HP</div>
</div>
<div id="controlsInfo">
    🖱️ WASD o arrastrar | 💥 Colisión = combate automático | ✨ Click en el mapa para moverte
</div>
<div id="animSpeedControl">
    <span>🎬 Duración por frame:</span>
    <input type="range" id="animSpeedSlider" min="0.08" max="2.0" step="0.01" value="0.25">
    <span id="animSpeedValue">0.25 s</span>
</div>
<div id="debugAnim">
    Frame actual: <span id="currentFrame">1</span> | Próximo cambio en <span id="timeToNext">0.00</span> s
</div>
<div id="respawnMessage">
    <div id="respawnText">Reapareciendo en</div>
    <div id="respawnCountdown">5</div>
</div>

<script>
(function() {
    // ==================== CONSTANTES DEL MUNDO (COINCIDEN CON SERVIDOR) ====================
    const WORLD_SIZE = 1600;
    const WORLD_CENTER = WORLD_SIZE / 2;
    const ISLAND_BASE_RADIUS = 720;
    
    // ==================== GENERACIÓN DE MÁSCARA DE ISLA (IDÉNTICA AL SERVIDOR) ====================
    // Genera una máscara booleana (true = arena, false = agua) con forma orgánica de continente.
    function generateIslandMask() {
        const mask = new Array(WORLD_SIZE);
        for (let i = 0; i < WORLD_SIZE; i++) {
            mask[i] = new Array(WORLD_SIZE);
            for (let j = 0; j < WORLD_SIZE; j++) {
                const dx = i - WORLD_CENTER;
                const dy = j - WORLD_CENTER;
                const dist = Math.hypot(dx, dy);
                const angle = Math.atan2(dy, dx);
                // Perturbaciones para forma orgánica (continente)
                const variation = Math.sin(angle * 5) * 45 + Math.cos(angle * 3) * 35 + Math.sin(angle * 7) * 25;
                const radiusAtAngle = ISLAND_BASE_RADIUS + variation;
                let isLand = dist < radiusAtAngle;
                // Asegurar bordes de agua (orilla exterior)
                if (i < 60 || i > WORLD_SIZE - 60 || j < 60 || j > WORLD_SIZE - 60) isLand = false;
                mask[i][j] = isLand;
            }
        }
        // Pequeños detalles: algunos "lagos" internos opcionales (opcional, para más realismo)
        for (let i = 0; i < 300; i++) {
            const x = Math.floor(Math.random() * WORLD_SIZE);
            const y = Math.floor(Math.random() * WORLD_SIZE);
            if (mask[x] && mask[x][y] === true && Math.random() < 0.15) {
                // pequeña mancha de agua interior (laguna)
                for (let dx = -6; dx <= 6; dx++) {
                    for (let dy = -6; dy <= 6; dy++) {
                        const nx = x + dx, ny = y + dy;
                        if (nx >= 0 && nx < WORLD_SIZE && ny >= 0 && ny < WORLD_SIZE && Math.hypot(dx, dy) < 5) {
                            mask[nx][ny] = false;
                        }
                    }
                }
            }
        }
        return mask;
    }
    
    let islandMask = null;
    let mapCanvas = null;          // canvas pre-renderizado del terreno
    
    // Precomputar el mapa visual (océano + arena + detalles)
    function buildTerrainCanvas() {
        if (!islandMask) islandMask = generateIslandMask();
        const canvasOff = document.createElement('canvas');
        canvasOff.width = WORLD_SIZE;
        canvasOff.height = WORLD_SIZE;
        const offCtx = canvasOff.getContext('2d');
        
        // 1. Fondo de océano (celeste)
        offCtx.fillStyle = "#7ec8e0";
        offCtx.fillRect(0, 0, WORLD_SIZE, WORLD_SIZE);
        
        // 2. Dibujar la arena (isla)
        offCtx.fillStyle = "#e0b05a";   // color arena base
        // Opcional: variaciones de color para dar textura
        for (let y = 0; y < WORLD_SIZE; y++) {
            for (let x = 0; x < WORLD_SIZE; x++) {
                if (islandMask[x][y]) {
                    // Pequeñas variaciones de color para simular detalles (arena más clara/oscura)
                    const variation = (Math.sin(x * 0.05) * Math.cos(y * 0.05) * 15) | 0;
                    let r = 0xe0 + variation;
                    let g = 0xb0 + variation * 0.6;
                    let b = 0x5a + variation * 0.3;
                    r = Math.min(255, Math.max(200, r));
                    g = Math.min(255, Math.max(150, g));
                    b = Math.min(255, Math.max(70, b));
                    offCtx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                    offCtx.fillRect(x, y, 1, 1);
                }
            }
        }
        
        // 3. Detalles visuales adicionales: pequeños puntos oscuros (rocas, vegetación)
        offCtx.fillStyle = "#aa8844";
        for (let i = 0; i < 6000; i++) {
            const x = Math.floor(Math.random() * WORLD_SIZE);
            const y = Math.floor(Math.random() * WORLD_SIZE);
            if (islandMask[x] && islandMask[x][y]) {
                offCtx.fillRect(x, y, 1, 1);
            }
        }
        offCtx.fillStyle = "#6a4a2a";
        for (let i = 0; i < 3000; i++) {
            const x = Math.floor(Math.random() * WORLD_SIZE);
            const y = Math.floor(Math.random() * WORLD_SIZE);
            if (islandMask[x] && islandMask[x][y]) {
                offCtx.fillRect(x, y, 1, 1);
            }
        }
        return canvasOff;
    }
    
    // ==================== FIN GENERACIÓN MAPA ====================
    
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    let myId = null;
    let players = {};
    let serverPlayers = {};
    let zone = { x: WORLD_CENTER, y: WORLD_CENTER, radius: 700 };
    let aliveCount = 0;
    let localPlayerHealth = 100;
    let lastAttackTime = 0;
    let attackCooldown = 0.8;

    const keyState = {
        w: false,
        s: false,
        a: false,
        d: false
    };
    
    let input = { dx: 0, dy: 0 };
    
    // ===================== POINT & CLICK (DESKTOP) =====================
    let moveTarget = null;
    const STOP_DISTANCE = 12.0;
    let recentTouch = false;
    let isClickMoving = false;
    
    function isLandAt(worldX, worldY) {
        if (!islandMask) return true;
        const ix = Math.floor(worldX);
        const iy = Math.floor(worldY);
        if (ix < 0 || ix >= WORLD_SIZE || iy < 0 || iy >= WORLD_SIZE) return false;
        return islandMask[ix][iy] === true;
    }
    
    function clearMoveTarget() {
        moveTarget = null;
        isClickMoving = false;
    }
    
    function setMoveTarget(worldX, worldY) {
        if (!players[myId] || !players[myId].alive) return;
        // Validar que el destino esté sobre arena (no agua)
        if (!isLandAt(worldX, worldY)) return;
        moveTarget = { x: worldX, y: worldY };
        keyState.w = false;
        keyState.s = false;
        keyState.a = false;
        keyState.d = false;
        isTouchInput = false;
        isClickMoving = true;
    }
    
    function updateMoveTargetDirection() {
        if (!players[myId] || !players[myId].alive) {
            if (moveTarget) clearMoveTarget();
            return;
        }
        if (keyState.w || keyState.s || keyState.a || keyState.d || isTouchInput) {
            if (moveTarget) clearMoveTarget();
            return;
        }
        if (!moveTarget) {
            if (input.dx !== 0 || input.dy !== 0) {
                input.dx = 0;
                input.dy = 0;
            }
            return;
        }
        const local = players[myId];
        const dxTarget = moveTarget.x - local.x;
        const dyTarget = moveTarget.y - local.y;
        const distance = Math.hypot(dxTarget, dyTarget);
        if (distance < STOP_DISTANCE) {
            clearMoveTarget();
            input.dx = 0;
            input.dy = 0;
            return;
        }
        const mag = distance;
        input.dx = dxTarget / mag;
        input.dy = dyTarget / mag;
    }
    
    function screenToWorld(clientX, clientY) {
        const localPlayer = players[myId];
        if (!localPlayer) return { x: 0, y: 0 };
        const camX = localPlayer.x - canvas.width / 2;
        const camY = localPlayer.y - canvas.height / 2;
        return { x: clientX + camX, y: clientY + camY };
    }
    
    function onCanvasClick(e) {
        if (recentTouch) {
            recentTouch = false;
            return;
        }
        e.preventDefault();
        if (!myId) return;
        if (!players[myId] || !players[myId].alive) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clickCanvasX = (e.clientX - rect.left) * scaleX;
        let clickCanvasY = (e.clientY - rect.top) * scaleY;
        clickCanvasX = Math.min(Math.max(0, clickCanvasX), canvas.width);
        clickCanvasY = Math.min(Math.max(0, clickCanvasY), canvas.height);
        const worldPos = screenToWorld(clickCanvasX, clickCanvasY);
        setMoveTarget(worldPos.x, worldPos.y);
    }
    
    function onCanvasContextMenu(e) {
        e.preventDefault();
        return false;
    }
    
    function onTouchStartForClick(e) {
        recentTouch = true;
        setTimeout(() => { recentTouch = false; }, 300);
    }
    
    function updateInputFromKeys() {
        let rawDx = (keyState.d ? 1 : 0) - (keyState.a ? 1 : 0);
        let rawDy = (keyState.s ? 1 : 0) - (keyState.w ? 1 : 0);
        input.dx = rawDx;
        input.dy = rawDy;
    }
    
    function handleKeyDown(e) {
        const key = e.key;
        let changed = false;
        if (key === 'w') { keyState.w = true; changed = true; e.preventDefault(); }
        else if (key === 's') { keyState.s = true; changed = true; e.preventDefault(); }
        else if (key === 'a') { keyState.a = true; changed = true; e.preventDefault(); }
        else if (key === 'd') { keyState.d = true; changed = true; e.preventDefault(); }
        if (changed) {
            updateInputFromKeys();
            isTouchInput = false;
            if (moveTarget) clearMoveTarget();
        }
    }
    
    function handleKeyUp(e) {
        const key = e.key;
        let changed = false;
        if (key === 'w') { keyState.w = false; changed = true; e.preventDefault(); }
        else if (key === 's') { keyState.s = false; changed = true; e.preventDefault(); }
        else if (key === 'a') { keyState.a = false; changed = true; e.preventDefault(); }
        else if (key === 'd') { keyState.d = false; changed = true; e.preventDefault(); }
        if (changed) updateInputFromKeys();
    }
    
    document.removeEventListener("keydown", window._oldKeyDown);
    document.removeEventListener("keyup", window._oldKeyUp);
    document.addEventListener("keydown", handleKeyDown);
    document.addEventListener("keyup", handleKeyUp);
    window._oldKeyDown = handleKeyDown;
    window._oldKeyUp = handleKeyUp;
    
    let deathTime = null;
    let pingHistory = [];
    const PING_HISTORY_LEN = 5;

    const SPRITE_URL = "ch003.png";
    const TOTAL_IMAGE_SIZE = 128;
    const TILES_PER_ROW = 4;
    const TILE_SIZE = TOTAL_IMAGE_SIZE / TILES_PER_ROW;
    const SPRITE_SCALE = 36 / TILE_SIZE;
    const SPRITE_W = TILE_SIZE * SPRITE_SCALE;
    const SPRITE_H = TILE_SIZE * SPRITE_SCALE;
    const CROP_LEFT = 0;
    const CROP_TOP = 0;
    const CROP_WIDTH = TILE_SIZE - CROP_LEFT;
    const CROP_HEIGHT = TILE_SIZE - CROP_TOP;

    let spriteSheet = new Image();
    let spriteLoaded = false;
    spriteSheet.onload = () => { spriteLoaded = true; };
    spriteSheet.src = SPRITE_URL;

    const DIRECTION_TO_ROW = {
        down: 0,
        up: 1,
        left: 2,
        right: 3
    };

    let animInterval = 0.25;
    const slider = document.getElementById('animSpeedSlider');
    const speedValue = document.getElementById('animSpeedValue');
    if (slider && speedValue) {
        slider.addEventListener('input', (e) => {
            animInterval = parseFloat(e.target.value);
            speedValue.innerText = animInterval.toFixed(2) + ' s';
        });
    }

    let playerAnim = {};
    const currentFrameSpan = document.getElementById('currentFrame');
    const timeToNextSpan = document.getElementById('timeToNext');

    let isTouchInput = false;

    function getPlayerColor(id, isMe, serverColor) {
        if (isMe) return "#88ff88";
        if (serverColor) return serverColor;
        let hash = 0;
        for (let i = 0; i < id.length; i++) {
            hash = ((hash << 5) - hash) + id.charCodeAt(i);
            hash |= 0;
        }
        const hue = Math.abs(hash % 360);
        return `hsl(${hue}, 70%, 55%)`;
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    // Inicializar máscara y mapa de terreno
    islandMask = generateIslandMask();
    mapCanvas = buildTerrainCanvas();

    const ws = new WebSocket(location.origin.replace("http", "ws"));

    ws.onmessage = (msg) => {
        const data = JSON.parse(msg.data);
        if (data.type === 'init') {
            myId = data.id;
        }
        else if (data.type === 'state') {
            serverPlayers = data.players;
            zone = data.zone;
            aliveCount = data.aliveCount;
            if (myId && serverPlayers[myId]) {
                localPlayerHealth = serverPlayers[myId].health;
                const percent = Math.max(0, (localPlayerHealth / 100) * 100);
                const healthBar = document.getElementById('healthBar');
                const healthText = document.getElementById('healthText');
                if (healthBar) healthBar.style.width = percent + '%';
                if (healthText) healthText.innerText = `${Math.floor(localPlayerHealth)} HP`;
                lastAttackTime = serverPlayers[myId].lastAttackTime;
            }
            const aliveCountSpan = document.getElementById('aliveCount');
            if (aliveCountSpan) aliveCountSpan.innerText = aliveCount;
            if (data.timestamp) {
                let rawPing = Date.now() - data.timestamp;
                if (rawPing < 0) rawPing = 0;
                pingHistory.push(rawPing);
                if (pingHistory.length > PING_HISTORY_LEN) pingHistory.shift();
                const avgPing = Math.round(pingHistory.reduce((a,b) => a+b, 0) / pingHistory.length);
                const pingSpan = document.getElementById('pingValue');
                if (pingSpan) pingSpan.innerText = avgPing;
            }
        }
        else if (data.type === 'damage') {
            if (data.target === myId) {
                showDamageNumber(data.damage, true);
            } else if (data.from === myId) {
                showDamageNumber(data.damage, false, data.target);
            }
        }
    };

    function showDamageNumber(damage, isMe, targetId) {
        const div = document.createElement('div');
        div.className = 'damageNumber';
        div.textContent = `-${damage}`;
        div.style.color = isMe ? '#ff8888' : '#ffaa44';
        div.style.left = (isMe ? canvas.width/2 : canvas.width/2 + (Math.random() - 0.5) * 100) + 'px';
        div.style.top = (isMe ? canvas.height/2 : canvas.height/2 + (Math.random() - 0.5) * 80) + 'px';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 800);
    }

    let startX = 0, startY = 0;
    canvas.addEventListener("touchstart", (e) => {
        e.preventDefault();
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        isTouchInput = true;
        if (moveTarget) clearMoveTarget();
    });
    canvas.addEventListener("touchmove", (e) => {
        e.preventDefault();
        let dx = e.touches[0].clientX - startX;
        let dy = e.touches[0].clientY - startY;
        let mag = Math.hypot(dx, dy) || 1;
        input.dx = dx / mag;
        input.dy = dy / mag;
        keyState.w = keyState.s = keyState.a = keyState.d = false;
        isTouchInput = true;
        if (moveTarget) clearMoveTarget();
    });
    canvas.addEventListener("touchend", (e) => {
        e.preventDefault();
        input.dx = 0;
        input.dy = 0;
        keyState.w = keyState.s = keyState.a = keyState.d = false;
    });

    canvas.addEventListener("click", onCanvasClick);
    canvas.addEventListener("contextmenu", onCanvasContextMenu);
    canvas.addEventListener("touchstart", onTouchStartForClick);
    
    setInterval(() => {
        if (ws.readyState === 1 && myId) {
            ws.send(JSON.stringify({ type: "move", dx: input.dx, dy: input.dy }));
        }
    }, 30);

    function interpolateAll() {
        for (let id in serverPlayers) {
            const sp = serverPlayers[id];
            if (!players[id]) {
                players[id] = { ...sp };
                playerAnim[id] = {
                    frame: 1,
                    directionRow: 0,
                    moving: false,
                    lastVisualX: sp.x,
                    lastVisualY: sp.y,
                    nextFrameTime: performance.now() / 1000 + animInterval,
                    idleCounter: 0
                };
            } else {
                players[id].x += (sp.x - players[id].x) * 0.7;
                players[id].y += (sp.y - players[id].y) * 0.7;
                players[id].health = sp.health;
                players[id].color = sp.color;
                players[id].alive = sp.alive;
                players[id].lastAttackTime = sp.lastAttackTime;
            }
        }
    }

    function getDirectionFromMovement(dx, dy) {
        if (isTouchInput || isClickMoving) {
            if (Math.abs(dx) > Math.abs(dy)) {
                return dx > 0 ? 'right' : 'left';
            } else if (Math.abs(dy) > 0.01) {
                return dy > 0 ? 'down' : 'up';
            }
        } else {
            if (Math.abs(dy) > 0.01) {
                return dy > 0 ? 'down' : 'up';
            }
            if (Math.abs(dx) > 0.01) {
                return dx > 0 ? 'right' : 'left';
            }
        }
        return null;
    }

    function updateAnimations() {
        const now = performance.now() / 1000;
        for (let id in players) {
            const p = players[id];
            if (!p.alive) continue;
            const anim = playerAnim[id];
            if (!anim) continue;
            const deltaX = p.x - anim.lastVisualX;
            const deltaY = p.y - anim.lastVisualY;
            const distance = Math.hypot(deltaX, deltaY);
            anim.lastVisualX = p.x;
            anim.lastVisualY = p.y;
            const MOVEMENT_THRESHOLD = 0.5;
            const DIRECTION_THRESHOLD = 2.0;
            const isMoving = distance > MOVEMENT_THRESHOLD;
            if (isMoving) {
                anim.idleCounter = 0;
                if (!anim.moving) {
                    anim.moving = true;
                    anim.frame = 0;
                    anim.nextFrameTime = now + animInterval;
                }
            } else {
                if (anim.moving) {
                    anim.idleCounter++;
                    if (anim.idleCounter >= 3) {
                        anim.moving = false;
                        anim.frame = 1;
                    }
                }
            }
            if (distance > DIRECTION_THRESHOLD) {
                const direction = getDirectionFromMovement(deltaX, deltaY);
                if (direction) {
                    const newRow = DIRECTION_TO_ROW[direction];
                    if (anim.directionRow !== newRow) {
                        anim.directionRow = newRow;
                        if (anim.moving) {
                            anim.frame = 0;
                            anim.nextFrameTime = now + animInterval;
                        }
                    }
                }
            }
            if (anim.moving && now >= anim.nextFrameTime) {
                anim.frame = (anim.frame + 1) % 4;
                anim.nextFrameTime = now + animInterval;
            }
            if (id === myId) {
                if (currentFrameSpan) currentFrameSpan.innerText = anim.frame;
                if (timeToNextSpan) {
                    const timeLeft = Math.max(0, anim.nextFrameTime - now);
                    timeToNextSpan.innerText = timeLeft.toFixed(2);
                }
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const localPlayer = players[myId];
        if (!localPlayer) return;
        
        let camX = localPlayer.x - canvas.width / 2;
        let camY = localPlayer.y - canvas.height / 2;
        
        ctx.save();
        ctx.translate(-camX, -camY);
        
        // Dibujar el terreno pre-renderizado (océano + isla)
        if (mapCanvas) {
            ctx.drawImage(mapCanvas, 0, 0);
        }
        
        // Zona segura (círculo de tormenta) - se dibuja encima del terreno
        ctx.beginPath();
        ctx.arc(zone.x, zone.y, zone.radius, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(0, 150, 200, 0.25)";
        ctx.fill();
        ctx.strokeStyle = "rgba(0, 200, 255, 0.9)";
        ctx.lineWidth = 4;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(zone.x, zone.y, zone.radius + 5, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(255, 0, 0, 0.4)";
        ctx.stroke();
        
        const barWidth = 32;
        const barHeight = 6;
        
        const playerList = [];
        for (let id in players) {
            if (players[id].alive) {
                playerList.push({ id, p: players[id] });
            }
        }
        playerList.sort((a, b) => a.p.y - b.p.y);
        
        for (const { id, p } of playerList) {
            const isMe = (id === myId);
            const anim = playerAnim[id] || { frame: 1, directionRow: 0 };
            const row = anim.directionRow;
            const frameCol = anim.frame;
            
            if (spriteLoaded) {
                const srcX = frameCol * TILE_SIZE + CROP_LEFT;
                const srcY = row * TILE_SIZE + CROP_TOP;
                const srcW = CROP_WIDTH;
                const srcH = CROP_HEIGHT;
                const destX = p.x - SPRITE_W/2;
                const destY = p.y - SPRITE_H/2;
                ctx.drawImage(spriteSheet, srcX, srcY, srcW, srcH, destX, destY, SPRITE_W, SPRITE_H);
            } else {
                ctx.beginPath();
                ctx.arc(p.x, p.y, SPRITE_W/2, 0, Math.PI * 2);
                ctx.fillStyle = getPlayerColor(id, isMe, p.color);
                ctx.fill();
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            
            const healthPercent = p.health / 100;
            const barX = p.x - barWidth / 2;
            const barY = p.y - SPRITE_H/2 - 12;
            ctx.fillStyle = "#333";
            ctx.fillRect(barX, barY, barWidth, barHeight);
            ctx.fillStyle = "#ff3333";
            ctx.fillRect(barX, barY, barWidth * healthPercent, barHeight);
            
            ctx.font = "12px Arial";
            ctx.fillStyle = "white";
            ctx.shadowBlur = 2;
            ctx.fillText(isMe ? "Tú" : `P${id.substring(0,4)}`, p.x - 12, p.y - SPRITE_H/2 - 14);
            
            if (isMe && lastAttackTime) {
                const now = Date.now() / 1000;
                const cooldownRemaining = Math.max(0, attackCooldown - (now - lastAttackTime));
                if (cooldownRemaining > 0) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, SPRITE_W/2 + 2, 0, Math.PI * 2 * (1 - cooldownRemaining / attackCooldown));
                    ctx.strokeStyle = "#ffaa44";
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
            }
        }
        ctx.restore();
        
        ctx.font = "bold 14px monospace";
        ctx.fillStyle = "white";
        ctx.shadowBlur = 2;
        ctx.fillText(`🌊 Zona segura: ${Math.floor(zone.radius)}m`, 20, 70);
        if (zone.radius < 300) {
            ctx.fillStyle = "#ff8888";
            ctx.fillText("⚠️ LA ISLA SE HUNDE RÁPIDO ⚠️", 20, 100);
        }
    }

    function updateRespawnMessage() {
        const localPlayer = players[myId];
        const msgDiv = document.getElementById('respawnMessage');
        const countdownSpan = document.getElementById('respawnCountdown');
        if (!localPlayer) return;
        if (!localPlayer.alive) {
            if (deathTime === null) deathTime = Date.now();
            const elapsed = (Date.now() - deathTime) / 1000;
            let remaining = Math.max(0, Math.ceil(5 - elapsed));
            if (countdownSpan) countdownSpan.innerText = remaining;
            if (msgDiv) msgDiv.style.display = 'block';
            if (moveTarget) clearMoveTarget();
        } else {
            if (deathTime !== null) deathTime = null;
            if (msgDiv) msgDiv.style.display = 'none';
        }
    }

    function gameLoop() {
        updateMoveTargetDirection();
        interpolateAll();
        updateAnimations();
        draw();
        updateRespawnMessage();
        requestAnimationFrame(gameLoop);
    }
    gameLoop();
})();
</script>
