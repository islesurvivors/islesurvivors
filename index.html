<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
/* (Mismo CSS que antes, sin cambios) */
body { margin:0; overflow:hidden; background:#111; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display:block; cursor: crosshair; }
#ui { position: fixed; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 8px; font-size: 14px; pointer-events: none; z-index: 10; }
#ping { position: fixed; top: 10px; right: 10px; color: white; background: rgba(0,0,0,0.6); padding: 8px 12px; border-radius: 8px; font-size: 12px; pointer-events: none; z-index: 10; }
#health { position: fixed; bottom: 20px; left: 20px; width: 200px; height: 20px; background: rgba(0,0,0,0.7); border-radius: 10px; overflow: hidden; border: 1px solid #fff; z-index: 10; }
#healthBar { width: 100%; height: 100%; background: #ff3333; transition: width 0.2s; }
#healthText { position: absolute; width: 100%; text-align: center; line-height: 20px; color: white; font-weight: bold; font-size: 12px; text-shadow: 1px 1px 0 black; }
#controlsInfo { position: fixed; bottom: 10px; right: 10px; color: white; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; font-size: 12px; pointer-events: none; }
#animSpeedControl { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 8px; color: white; font-size: 12px; z-index: 20; display: flex; gap: 10px; align-items: center; pointer-events: auto; }
#animSpeedControl input { width: 200px; cursor: pointer; }
#animSpeedValue { min-width: 55px; text-align: center; }
#debugAnim { position: fixed; bottom: 80px; left: 20px; background: rgba(0,0,0,0.7); padding: 4px 10px; border-radius: 8px; color: #ffaa44; font-family: monospace; font-size: 14px; pointer-events: none; z-index: 20; }
.damageNumber { position: absolute; font-weight: bold; font-size: 18px; text-shadow: 1px 1px 0 black; animation: floatUp 0.8s forwards; pointer-events: none; z-index: 20; }
@keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-40px); } }
#respawnMessage { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); color: white; padding: 24px 48px; border-radius: 24px; text-align: center; z-index: 100; display: none; font-family: 'Segoe UI', system-ui, monospace; letter-spacing: 1px; box-shadow: 0 0 20px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); }
#respawnText { font-size: 20px; font-weight: 400; margin-bottom: 12px; opacity: 0.9; }
#respawnCountdown { font-size: 64px; font-weight: 700; line-height: 1; text-shadow: 0 0 10px rgba(255,255,255,0.6); color: #ffaa44; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui"><div>🏆 Jugadores vivos: <span id="aliveCount">0</span></div></div>
<div id="ping">📡 Ping: <span id="pingValue">0</span> ms</div>
<div id="health"><div id="healthBar"></div><div id="healthText">100 HP</div></div>
<div id="controlsInfo">🖱️ WASD o arrastrar | 💥 Colisión = combate automático | ✨ Click en el mapa para moverte</div>
<div id="animSpeedControl"><span>🎬 Duración por frame:</span><input type="range" id="animSpeedSlider" min="0.08" max="2.0" step="0.01" value="0.25"><span id="animSpeedValue">0.25 s</span></div>
<div id="debugAnim">Frame actual: <span id="currentFrame">1</span> | Próximo cambio en <span id="timeToNext">0.00</span> s</div>
<div id="respawnMessage"><div id="respawnText">Reapareciendo en</div><div id="respawnCountdown">5</div></div>

<script>
(function() {
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    let myId = null;
    let serverPlayers = {};      // datos crudos del servidor (para interpolación)
    let players = {};            // para dibujar: interpolados para otros, predicho para local
    let zone = { x: 800, y: 800, radius: 700 };
    let aliveCount = 0;
    let localPlayerHealth = 100;
    let lastAttackTime = 0;
    let attackCooldown = 0.8;

    // Estado de teclado
    const keyState = { w: false, s: false, a: false, d: false };
    let input = { dx: 0, dy: 0 };
    let isTouchInput = false;

    // Point & click
    let moveTarget = null;
    const STOP_DISTANCE = 12.0;
    let isClickMoving = false;
    let recentTouch = false;

    // ===== MEJORA: PREDICCIÓN LOCAL =====
    let localPredicted = { x: 0, y: 0, health: 100, alive: true };
    let lastServerUpdateTime = 0;
    let lastServerPos = { x: 0, y: 0 };
    let correctionFactor = 0.3; // suavizado al corregir

    // ===== MEJORA: INTERPOLACIÓN BASADA EN TIEMPO =====
    let lastServerState = null;      // estado anterior del servidor (timestamp, players)
    let currentServerState = null;   // estado actual del servidor
    let lastServerStateTime = 0;
    let currentServerStateTime = 0;

    // Animación y sprites (igual que antes)
    const SPRITE_URL = "ch003.png";
    const TOTAL_IMAGE_SIZE = 128;
    const TILES_PER_ROW = 4;
    const TILE_SIZE = TOTAL_IMAGE_SIZE / TILES_PER_ROW;
    const SPRITE_SCALE = 36 / TILE_SIZE;
    const SPRITE_W = TILE_SIZE * SPRITE_SCALE;
    const SPRITE_H = TILE_SIZE * SPRITE_SCALE;
    const CROP_LEFT = 0;
    const CROP_TOP = 0;
    const CROP_WIDTH = TILE_SIZE - CROP_LEFT;
    const CROP_HEIGHT = TILE_SIZE - CROP_TOP;
    let spriteSheet = new Image();
    let spriteLoaded = false;
    spriteSheet.onload = () => { spriteLoaded = true; };
    spriteSheet.src = SPRITE_URL;

    const DIRECTION_TO_ROW = { down: 0, up: 1, left: 2, right: 3 };
    let animInterval = 0.25;
    const slider = document.getElementById('animSpeedSlider');
    const speedValue = document.getElementById('animSpeedValue');
    if (slider && speedValue) {
        slider.addEventListener('input', (e) => {
            animInterval = parseFloat(e.target.value);
            speedValue.innerText = animInterval.toFixed(2) + ' s';
        });
    }
    let playerAnim = {};
    const currentFrameSpan = document.getElementById('currentFrame');
    const timeToNextSpan = document.getElementById('timeToNext');

    // Utilidades
    function getPlayerColor(id, isMe, serverColor) {
        if (isMe) return "#88ff88";
        if (serverColor) return serverColor;
        let hash = 0;
        for (let i = 0; i < id.length; i++) {
            hash = ((hash << 5) - hash) + id.charCodeAt(i);
            hash |= 0;
        }
        const hue = Math.abs(hash % 360);
        return `hsl(${hue}, 70%, 55%)`;
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    // WebSocket
    const ws = new WebSocket(location.origin.replace("http", "ws"));
    let pingHistory = [];
    const PING_HISTORY_LEN = 5;

    ws.onmessage = (msg) => {
        const data = JSON.parse(msg.data);
        if (data.type === 'init') {
            myId = data.id;
        }
        else if (data.type === 'state') {
            // Guardamos el estado actual del servidor junto con timestamp
            const nowTime = Date.now();
            if (currentServerState !== null) {
                // Pasamos el actual a "previo"
                lastServerState = currentServerState;
                lastServerStateTime = currentServerStateTime;
            }
            currentServerState = data;
            currentServerStateTime = nowTime;

            // Actualizar datos locales inmediatos (health, aliveCount, zona)
            aliveCount = data.aliveCount;
            zone = data.zone;
            if (myId && data.players[myId]) {
                const sp = data.players[myId];
                localPlayerHealth = sp.health;
                const percent = Math.max(0, (localPlayerHealth / 100) * 100);
                const healthBar = document.getElementById('healthBar');
                const healthText = document.getElementById('healthText');
                if (healthBar) healthBar.style.width = percent + '%';
                if (healthText) healthText.innerText = `${Math.floor(localPlayerHealth)} HP`;
                lastAttackTime = sp.lastAttackTime;
                lastServerPos = { x: sp.x, y: sp.y };
                lastServerUpdateTime = nowTime;

                // Corrección para predicción local
                if (localPredicted.alive) {
                    // Aplicamos corrección suave hacia la posición del servidor
                    localPredicted.x += (sp.x - localPredicted.x) * correctionFactor;
                    localPredicted.y += (sp.y - localPredicted.y) * correctionFactor;
                    localPredicted.health = sp.health;
                    localPredicted.alive = sp.alive;
                } else {
                    // Si está muerto en el servidor, actualizamos predicción
                    localPredicted.x = sp.x;
                    localPredicted.y = sp.y;
                    localPredicted.health = sp.health;
                    localPredicted.alive = sp.alive;
                }
            }

            // Ping
            if (data.timestamp) {
                let rawPing = Date.now() - data.timestamp;
                if (rawPing < 0) rawPing = 0;
                pingHistory.push(rawPing);
                if (pingHistory.length > PING_HISTORY_LEN) pingHistory.shift();
                const avgPing = Math.round(pingHistory.reduce((a,b) => a+b, 0) / pingHistory.length);
                const pingSpan = document.getElementById('pingValue');
                if (pingSpan) pingSpan.innerText = avgPing;
            }
        }
        else if (data.type === 'damage') {
            if (data.target === myId) {
                showDamageNumber(data.damage, true);
            } else if (data.from === myId) {
                showDamageNumber(data.damage, false, data.target);
            }
        }
    };

    function showDamageNumber(damage, isMe, targetId) {
        const div = document.createElement('div');
        div.className = 'damageNumber';
        div.textContent = `-${damage}`;
        div.style.color = isMe ? '#ff8888' : '#ffaa44';
        div.style.left = (isMe ? canvas.width/2 : canvas.width/2 + (Math.random() - 0.5) * 100) + 'px';
        div.style.top = (isMe ? canvas.height/2 : canvas.height/2 + (Math.random() - 0.5) * 80) + 'px';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 800);
    }

    // ===== FUNCIONES DE MOVIMIENTO =====
    function updateInputFromKeys() {
        let rawDx = (keyState.d ? 1 : 0) - (keyState.a ? 1 : 0);
        let rawDy = (keyState.s ? 1 : 0) - (keyState.w ? 1 : 0);
        input.dx = rawDx;
        input.dy = rawDy;
        // Si hay entrada de teclado, cancelamos point-and-click
        if (rawDx !== 0 || rawDy !== 0) {
            if (moveTarget) clearMoveTarget();
        }
    }

    function handleKeyDown(e) {
        const key = e.key;
        let changed = false;
        if (key === 'w') { keyState.w = true; changed = true; e.preventDefault(); }
        else if (key === 's') { keyState.s = true; changed = true; e.preventDefault(); }
        else if (key === 'a') { keyState.a = true; changed = true; e.preventDefault(); }
        else if (key === 'd') { keyState.d = true; changed = true; e.preventDefault(); }
        if (changed) {
            updateInputFromKeys();
            isTouchInput = false;
            if (moveTarget) clearMoveTarget();
        }
    }

    function handleKeyUp(e) {
        const key = e.key;
        let changed = false;
        if (key === 'w') { keyState.w = false; changed = true; e.preventDefault(); }
        else if (key === 's') { keyState.s = false; changed = true; e.preventDefault(); }
        else if (key === 'a') { keyState.a = false; changed = true; e.preventDefault(); }
        else if (key === 'd') { keyState.d = false; changed = true; e.preventDefault(); }
        if (changed) updateInputFromKeys();
    }

    document.removeEventListener("keydown", window._oldKeyDown);
    document.removeEventListener("keyup", window._oldKeyUp);
    document.addEventListener("keydown", handleKeyDown);
    document.addEventListener("keyup", handleKeyUp);
    window._oldKeyDown = handleKeyDown;
    window._oldKeyUp = handleKeyUp;

    // Touch (drag)
    let startX = 0, startY = 0;
    canvas.addEventListener("touchstart", (e) => {
        e.preventDefault();
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        isTouchInput = true;
        if (moveTarget) clearMoveTarget();
    });
    canvas.addEventListener("touchmove", (e) => {
        e.preventDefault();
        let dx = e.touches[0].clientX - startX;
        let dy = e.touches[0].clientY - startY;
        let mag = Math.hypot(dx, dy) || 1;
        input.dx = dx / mag;
        input.dy = dy / mag;
        keyState.w = keyState.s = keyState.a = keyState.d = false;
        isTouchInput = true;
        if (moveTarget) clearMoveTarget();
    });
    canvas.addEventListener("touchend", (e) => {
        e.preventDefault();
        input.dx = 0;
        input.dy = 0;
        keyState.w = keyState.s = keyState.a = keyState.d = false;
        isTouchInput = false;
    });

    // Point & click
    function screenToWorld(clientX, clientY) {
        const localPlayer = localPredicted;
        if (!localPlayer) return { x: 0, y: 0 };
        const camX = localPlayer.x - canvas.width / 2;
        const camY = localPlayer.y - canvas.height / 2;
        return { x: clientX + camX, y: clientY + camY };
    }

    function setMoveTarget(worldX, worldY) {
        if (!localPredicted.alive) return;
        moveTarget = { x: worldX, y: worldY };
        keyState.w = false; keyState.s = false; keyState.a = false; keyState.d = false;
        isTouchInput = false;
        isClickMoving = true;
    }

    function clearMoveTarget() {
        moveTarget = null;
        isClickMoving = false;
    }

    function updateMoveTargetDirection() {
        if (!localPredicted.alive) {
            if (moveTarget) clearMoveTarget();
            return;
        }
        if (keyState.w || keyState.s || keyState.a || keyState.d || isTouchInput) {
            if (moveTarget) clearMoveTarget();
            return;
        }
        if (!moveTarget) {
            if (input.dx !== 0 || input.dy !== 0) {
                input.dx = 0;
                input.dy = 0;
            }
            return;
        }
        const dxTarget = moveTarget.x - localPredicted.x;
        const dyTarget = moveTarget.y - localPredicted.y;
        const distance = Math.hypot(dxTarget, dyTarget);
        if (distance < STOP_DISTANCE) {
            clearMoveTarget();
            input.dx = 0;
            input.dy = 0;
            return;
        }
        const mag = distance;
        input.dx = dxTarget / mag;
        input.dy = dyTarget / mag;
    }

    function onCanvasClick(e) {
        if (recentTouch) { recentTouch = false; return; }
        e.preventDefault();
        if (!myId) return;
        if (!localPredicted.alive) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clickCanvasX = (e.clientX - rect.left) * scaleX;
        let clickCanvasY = (e.clientY - rect.top) * scaleY;
        clickCanvasX = Math.min(Math.max(0, clickCanvasX), canvas.width);
        clickCanvasY = Math.min(Math.max(0, clickCanvasY), canvas.height);
        const worldPos = screenToWorld(clickCanvasX, clickCanvasY);
        setMoveTarget(worldPos.x, worldPos.y);
    }

    function onCanvasContextMenu(e) { e.preventDefault(); return false; }
    function onTouchStartForClick(e) { recentTouch = true; setTimeout(() => { recentTouch = false; }, 300); }

    canvas.addEventListener("click", onCanvasClick);
    canvas.addEventListener("contextmenu", onCanvasContextMenu);
    canvas.addEventListener("touchstart", onTouchStartForClick);

    // Envío de movimiento al servidor (cada 30 ms)
    setInterval(() => {
        if (ws.readyState === 1 && myId) {
            ws.send(JSON.stringify({ type: "move", dx: input.dx, dy: input.dy }));
        }
    }, 30);

    // ===== PREDICCIÓN LOCAL: actualizar posición cada frame =====
    let lastFrameTime = performance.now() / 1000;
    function updateLocalPrediction(nowSec) {
        if (!localPredicted.alive) return;
        const delta = Math.min(0.033, nowSec - lastFrameTime);
        lastFrameTime = nowSec;

        const speed = 200; // misma que el servidor
        localPredicted.x += input.dx * speed * delta;
        localPredicted.y += input.dy * speed * delta;
        // Límites del mundo
        const WORLD_SIZE = 1600;
        const PLAYER_RADIUS = 8;
        localPredicted.x = Math.min(Math.max(localPredicted.x, PLAYER_RADIUS), WORLD_SIZE - PLAYER_RADIUS);
        localPredicted.y = Math.min(Math.max(localPredicted.y, PLAYER_RADIUS), WORLD_SIZE - PLAYER_RADIUS);
    }

    // ===== INTERPOLACIÓN DE OTROS JUGADORES =====
    function interpolatePlayers() {
        if (!currentServerState) return;
        const now = Date.now();
        let t = 1.0; // por defecto usar el último estado

        if (lastServerState && lastServerStateTime > 0) {
            const total = currentServerStateTime - lastServerStateTime;
            if (total > 0) {
                t = (now - lastServerStateTime) / total;
                t = Math.min(1.0, Math.max(0.0, t));
            }
        }

        // Limpiar players y llenar con interpolación
        const newPlayers = {};
        for (let id in currentServerState.players) {
            const spCurrent = currentServerState.players[id];
            if (!spCurrent.alive) {
                // Jugador muerto no se dibuja
                continue;
            }

            let interpX = spCurrent.x;
            let interpY = spCurrent.y;

            if (lastServerState && lastServerState.players[id]) {
                const spPrev = lastServerState.players[id];
                if (spPrev.alive) {
                    interpX = spPrev.x + (spCurrent.x - spPrev.x) * t;
                    interpY = spPrev.y + (spCurrent.y - spPrev.y) * t;
                }
            }

            newPlayers[id] = {
                id: spCurrent.id,
                x: interpX,
                y: interpY,
                health: spCurrent.health,
                alive: spCurrent.alive,
                lastAttackTime: spCurrent.lastAttackTime,
                color: spCurrent.color
            };
        }

        players = newPlayers;
    }

    // ===== DIRECCIÓN PARA SPRITES (sin cambios) =====
    function getDirectionFromMovement(dx, dy) {
        if (isTouchInput || isClickMoving) {
            if (Math.abs(dx) > Math.abs(dy)) {
                return dx > 0 ? 'right' : 'left';
            } else if (Math.abs(dy) > 0.01) {
                return dy > 0 ? 'down' : 'up';
            }
        } else {
            if (Math.abs(dy) > 0.01) {
                return dy > 0 ? 'down' : 'up';
            }
            if (Math.abs(dx) > 0.01) {
                return dx > 0 ? 'right' : 'left';
            }
        }
        return null;
    }

    function updateAnimations() {
        const now = performance.now() / 1000;
        for (let id in players) {
            const p = players[id];
            if (!p.alive) continue;
            const anim = playerAnim[id];
            if (!anim) continue;
            const deltaX = p.x - anim.lastVisualX;
            const deltaY = p.y - anim.lastVisualY;
            const distance = Math.hypot(deltaX, deltaY);
            anim.lastVisualX = p.x;
            anim.lastVisualY = p.y;
            const MOVEMENT_THRESHOLD = 0.5;
            const DIRECTION_THRESHOLD = 2.0;
            const isMoving = distance > MOVEMENT_THRESHOLD;
            if (isMoving) {
                anim.idleCounter = 0;
                if (!anim.moving) {
                    anim.moving = true;
                    anim.frame = 0;
                    anim.nextFrameTime = now + animInterval;
                }
            } else {
                if (anim.moving) {
                    anim.idleCounter++;
                    if (anim.idleCounter >= 3) {
                        anim.moving = false;
                        anim.frame = 1;
                    }
                }
            }
            if (distance > DIRECTION_THRESHOLD) {
                const direction = getDirectionFromMovement(deltaX, deltaY);
                if (direction) {
                    const newRow = DIRECTION_TO_ROW[direction];
                    if (anim.directionRow !== newRow) {
                        anim.directionRow = newRow;
                        if (anim.moving) {
                            anim.frame = 0;
                            anim.nextFrameTime = now + animInterval;
                        }
                    }
                }
            }
            if (anim.moving && now >= anim.nextFrameTime) {
                anim.frame = (anim.frame + 1) % 4;
                anim.nextFrameTime = now + animInterval;
            }
            if (id === myId) {
                if (currentFrameSpan) currentFrameSpan.innerText = anim.frame;
                if (timeToNextSpan) {
                    const timeLeft = Math.max(0, anim.nextFrameTime - now);
                    timeToNextSpan.innerText = timeLeft.toFixed(2);
                }
            }
        }
    }

    function drawGround(camX, camY) {
        ctx.fillStyle = "#e0b05a";
        ctx.fillRect(camX, camY, canvas.width, canvas.height);
        const gridSpacing = 80;
        const startX = Math.floor(camX / gridSpacing) * gridSpacing;
        const startY = Math.floor(camY / gridSpacing) * gridSpacing;
        ctx.fillStyle = "#c99a3a";
        for (let x = startX; x < camX + canvas.width + gridSpacing; x += gridSpacing) {
            for (let y = startY; y < camY + canvas.height + gridSpacing; y += gridSpacing) {
                ctx.beginPath();
                ctx.arc(x, y, 2.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const localPlayer = localPredicted;
        if (!localPlayer || !localPlayer.alive) {
            // Si está muerto, seguimos dibujando el mapa pero sin personaje local (ya se maneja en resurrección)
            if (zone) {
                let camX = (zone.x - canvas.width/2);
                let camY = (zone.y - canvas.height/2);
                ctx.save();
                ctx.translate(-camX, -camY);
                drawGround(camX, camY);
                ctx.restore();
            }
            return;
        }

        let camX = localPlayer.x - canvas.width / 2;
        let camY = localPlayer.y - canvas.height / 2;
        ctx.save();
        ctx.translate(-camX, -camY);
        drawGround(camX, camY);

        // Zona
        ctx.beginPath();
        ctx.arc(zone.x, zone.y, zone.radius, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(0, 150, 200, 0.25)";
        ctx.fill();
        ctx.strokeStyle = "rgba(0, 200, 255, 0.9)";
        ctx.lineWidth = 4;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(zone.x, zone.y, zone.radius + 5, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(255, 0, 0, 0.4)";
        ctx.stroke();

        const barWidth = 32;
        const barHeight = 6;

        // Dibujar otros jugadores interpolados
        const playerList = [];
        for (let id in players) {
            if (players[id].alive) {
                playerList.push({ id, p: players[id] });
            }
        }
        playerList.sort((a, b) => a.p.y - b.p.y);

        for (const { id, p } of playerList) {
            const isMe = (id === myId);
            // Los demás jugadores usan el sprite con animación
            const anim = playerAnim[id] || { frame: 1, directionRow: 0 };
            const row = anim.directionRow;
            const frameCol = anim.frame;

            if (spriteLoaded) {
                const srcX = frameCol * TILE_SIZE + CROP_LEFT;
                const srcY = row * TILE_SIZE + CROP_TOP;
                const srcW = CROP_WIDTH;
                const srcH = CROP_HEIGHT;
                const destX = p.x - SPRITE_W/2;
                const destY = p.y - SPRITE_H/2;
                ctx.drawImage(spriteSheet, srcX, srcY, srcW, srcH, destX, destY, SPRITE_W, SPRITE_H);
            } else {
                ctx.beginPath();
                ctx.arc(p.x, p.y, SPRITE_W/2, 0, Math.PI * 2);
                ctx.fillStyle = getPlayerColor(id, isMe, p.color);
                ctx.fill();
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            const healthPercent = p.health / 100;
            const barX = p.x - barWidth / 2;
            const barY = p.y - SPRITE_H/2 - 12;
            ctx.fillStyle = "#333";
            ctx.fillRect(barX, barY, barWidth, barHeight);
            ctx.fillStyle = "#ff3333";
            ctx.fillRect(barX, barY, barWidth * healthPercent, barHeight);

            ctx.font = "12px Arial";
            ctx.fillStyle = "white";
            ctx.shadowBlur = 2;
            ctx.fillText(isMe ? "Tú" : `P${id.substring(0,4)}`, p.x - 12, p.y - SPRITE_H/2 - 14);
        }

        // Dibujar al jugador local con predicción
        if (localPlayer.alive) {
            const anim = playerAnim[myId] || { frame: 1, directionRow: 0 };
            const row = anim.directionRow;
            const frameCol = anim.frame;
            if (spriteLoaded) {
                const srcX = frameCol * TILE_SIZE + CROP_LEFT;
                const srcY = row * TILE_SIZE + CROP_TOP;
                const srcW = CROP_WIDTH;
                const srcH = CROP_HEIGHT;
                const destX = localPlayer.x - SPRITE_W/2;
                const destY = localPlayer.y - SPRITE_H/2;
                ctx.drawImage(spriteSheet, srcX, srcY, srcW, srcH, destX, destY, SPRITE_W, SPRITE_H);
            } else {
                ctx.beginPath();
                ctx.arc(localPlayer.x, localPlayer.y, SPRITE_W/2, 0, Math.PI * 2);
                ctx.fillStyle = "#88ff88";
                ctx.fill();
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            const healthPercent = localPlayer.health / 100;
            const barX = localPlayer.x - barWidth / 2;
            const barY = localPlayer.y - SPRITE_H/2 - 12;
            ctx.fillStyle = "#333";
            ctx.fillRect(barX, barY, barWidth, barHeight);
            ctx.fillStyle = "#ff3333";
            ctx.fillRect(barX, barY, barWidth * healthPercent, barHeight);
            ctx.fillStyle = "white";
            ctx.fillText("Tú", localPlayer.x - 12, localPlayer.y - SPRITE_H/2 - 14);

            if (lastAttackTime) {
                const nowSec = Date.now() / 1000;
                const cooldownRemaining = Math.max(0, attackCooldown - (nowSec - lastAttackTime));
                if (cooldownRemaining > 0) {
                    ctx.beginPath();
                    ctx.arc(localPlayer.x, localPlayer.y, SPRITE_W/2 + 2, 0, Math.PI * 2 * (1 - cooldownRemaining / attackCooldown));
                    ctx.strokeStyle = "#ffaa44";
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
            }
        }

        ctx.restore();

        ctx.font = "bold 14px monospace";
        ctx.fillStyle = "white";
        ctx.shadowBlur = 2;
        ctx.fillText(`🌊 Zona segura: ${Math.floor(zone.radius)}m`, 20, 70);
        if (zone.radius < 300) {
            ctx.fillStyle = "#ff8888";
            ctx.fillText("⚠️ LA ISLA SE HUNDE RÁPIDO ⚠️", 20, 100);
        }
    }

    function updateRespawnMessage() {
        const msgDiv = document.getElementById('respawnMessage');
        const countdownSpan = document.getElementById('respawnCountdown');
        if (!localPredicted.alive) {
            if (localPredicted.respawnTime) {
                const remaining = Math.max(0, Math.ceil((localPredicted.respawnTime - Date.now()) / 1000));
                if (countdownSpan) countdownSpan.innerText = remaining;
                if (msgDiv) msgDiv.style.display = 'block';
            } else {
                if (msgDiv) msgDiv.style.display = 'block';
                if (countdownSpan) countdownSpan.innerText = "5";
            }
        } else {
            if (msgDiv) msgDiv.style.display = 'none';
        }
    }

    // Inicializar estructuras
    function init() {
        // Esperar a recibir el primer estado del servidor para inicializar localPredicted
        const checkInterval = setInterval(() => {
            if (myId && currentServerState && currentServerState.players[myId]) {
                const sp = currentServerState.players[myId];
                localPredicted = {
                    x: sp.x,
                    y: sp.y,
                    health: sp.health,
                    alive: sp.alive,
                    respawnTime: null
                };
                lastServerPos = { x: sp.x, y: sp.y };
                lastServerUpdateTime = Date.now();
                clearInterval(checkInterval);
            }
        }, 100);
    }
    init();

    // Loop principal
    let lastAnimUpdate = performance.now() / 1000;
    function gameLoop() {
        const now = performance.now() / 1000;
        updateMoveTargetDirection();
        updateLocalPrediction(now);
        interpolatePlayers();
        // Inicializar animaciones para jugadores que aparecen
        for (let id in players) {
            if (!playerAnim[id]) {
                playerAnim[id] = {
                    frame: 1,
                    directionRow: 0,
                    moving: false,
                    lastVisualX: players[id].x,
                    lastVisualY: players[id].y,
                    nextFrameTime: now + animInterval,
                    idleCounter: 0
                };
            }
        }
        if (myId && !playerAnim[myId] && localPredicted.alive) {
            playerAnim[myId] = {
                frame: 1,
                directionRow: 0,
                moving: false,
                lastVisualX: localPredicted.x,
                lastVisualY: localPredicted.y,
                nextFrameTime: now + animInterval,
                idleCounter: 0
            };
        }
        updateAnimations();
        draw();
        updateRespawnMessage();
        requestAnimationFrame(gameLoop);
    }
    gameLoop();
})();
</script>
