<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const ws = new WebSocket(location.origin.replace("http", "ws"));

let players = {};
let input = { dx: 0, dy: 0 };

// WASD
document.addEventListener("keydown", (e) => {
  if (e.key === "w") input.dy = -1;
  if (e.key === "s") input.dy = 1;
  if (e.key === "a") input.dx = -1;
  if (e.key === "d") input.dx = 1;
});

document.addEventListener("keyup", (e) => {
  if (["w","s"].includes(e.key)) input.dy = 0;
  if (["a","d"].includes(e.key)) input.dx = 0;
});

// TOUCH
let startX = 0, startY = 0;

canvas.addEventListener("touchstart", (e) => {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

canvas.addEventListener("touchmove", (e) => {
  let dx = e.touches[0].clientX - startX;
  let dy = e.touches[0].clientY - startY;

  let mag = Math.sqrt(dx*dx + dy*dy) || 1;

  input.dx = dx / mag;
  input.dy = dy / mag;
});

canvas.addEventListener("touchend", () => {
  input.dx = 0;
  input.dy = 0;
});

// SEND INPUT
setInterval(() => {
  ws.send(JSON.stringify({
    type: "move",
    dx: input.dx,
    dy: input.dy
  }));
}, 50);

// RECEIVE STATE
ws.onmessage = (msg) => {
  players = JSON.parse(msg.data);
};

// RENDER
function loop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for (let id in players) {
    let p = players[id];

    ctx.beginPath();
    ctx.arc(p.x, p.y, 10, 0, Math.PI*2);
    ctx.fillStyle = "lime";
    ctx.fill();
  }

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
