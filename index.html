<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// RESPONSIVE
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// WEBSOCKET
const ws = new WebSocket(location.origin.replace("http", "ws"));

let players = {};
let serverPlayers = {};

let input = { dx: 0, dy: 0 };

// =======================
// CONTROLES PC
// =======================
document.addEventListener("keydown", (e) => {
  if (e.key === "w") input.dy = -1;
  if (e.key === "s") input.dy = 1;
  if (e.key === "a") input.dx = -1;
  if (e.key === "d") input.dx = 1;
});

document.addEventListener("keyup", (e) => {
  if (["w","s"].includes(e.key)) input.dy = 0;
  if (["a","d"].includes(e.key)) input.dx = 0;
});

// =======================
// MOBILE
// =======================
let startX = 0, startY = 0;

canvas.addEventListener("touchstart", (e) => {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

canvas.addEventListener("touchmove", (e) => {
  let dx = e.touches[0].clientX - startX;
  let dy = e.touches[0].clientY - startY;

  let mag = Math.sqrt(dx*dx + dy*dy) || 1;

  input.dx = dx / mag;
  input.dy = dy / mag;
});

canvas.addEventListener("touchend", () => {
  input.dx = 0;
  input.dy = 0;
});

// =======================
// ENVÍO MÁS RÁPIDO
// =======================
setInterval(() => {
  if (ws.readyState === 1) {
    ws.send(JSON.stringify({
      type: "move",
      dx: input.dx,
      dy: input.dy
    }));
  }
}, 30); // antes 50 → ahora más fluido

// =======================
// RECIBIR ESTADO
// =======================
ws.onmessage = (msg) => {
  serverPlayers = JSON.parse(msg.data);

  for (let id in serverPlayers) {
    if (!players[id]) {
      players[id] = { ...serverPlayers[id] };
    }
  }
};

// =======================
// INTERPOLACIÓN MEJORADA
// =======================
function update() {
  for (let id in serverPlayers) {
    let sp = serverPlayers[id];
    let p = players[id];

    if (!p) continue;

    // más agresivo = menos lag visual
    p.x += (sp.x - p.x) * 0.4;
    p.y += (sp.y - p.y) * 0.4;
  }
}

// =======================
// RENDER
// =======================
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for (let id in players) {
    let p = players[id];

    ctx.beginPath();
    ctx.arc(p.x, p.y, 10, 0, Math.PI*2);

    // 👇 CAMBIO DE COLOR (para verificar deploy)
    ctx.fillStyle = "cyan";

    ctx.fill();
  }
}

// =======================
// LOOP
// =======================
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
