<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
body { margin:0; overflow:hidden; background:#111; font-family: Arial, sans-serif; }
canvas { display:block; cursor: crosshair; }
#ui {
    position: fixed;
    top: 10px;
    left: 10px;
    color: white;
    background: rgba(0,0,0,0.6);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14px;
    pointer-events: none;
    z-index: 10;
}
#ping {
    position: fixed;
    top: 10px;
    right: 10px;
    color: white;
    background: rgba(0,0,0,0.6);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    pointer-events: none;
    z-index: 10;
}
#health {
    position: fixed;
    bottom: 20px;
    left: 20px;
    width: 200px;
    height: 20px;
    background: rgba(0,0,0,0.7);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #fff;
    z-index: 10;
}
#healthBar {
    width: 100%;
    height: 100%;
    background: #ff3333;
    transition: width 0.2s;
}
#healthText {
    position: absolute;
    width: 100%;
    text-align: center;
    line-height: 20px;
    color: white;
    font-weight: bold;
    font-size: 12px;
    text-shadow: 1px 1px 0 black;
}
#controlsInfo {
    position: fixed;
    bottom: 10px;
    right: 10px;
    color: white;
    background: rgba(0,0,0,0.5);
    padding: 5px 10px;
    border-radius: 5px;
    font-size: 12px;
    pointer-events: none;
}
.damageNumber {
    position: absolute;
    font-weight: bold;
    font-size: 18px;
    text-shadow: 1px 1px 0 black;
    animation: floatUp 0.8s forwards;
    pointer-events: none;
    z-index: 20;
}
@keyframes floatUp {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-40px); }
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
    <div>🏆 Jugadores vivos: <span id="aliveCount">0</span></div>
</div>
<div id="ping">
    📡 Ping: <span id="pingValue">0</span> ms
</div>
<div id="health">
    <div id="healthBar"></div>
    <div id="healthText">100 HP</div>
</div>
<div id="controlsInfo">
    🖱️ WASD o arrastrar | 💥 Colisión = combate automático
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let myId = null;
let players = {};           // interpolados para render
let serverPlayers = {};     // última posición real del servidor
let zone = { x: 800, y: 800, radius: 700 };
let aliveCount = 0;
let localPlayerHealth = 100;
let lastAttackTime = 0;
let attackCooldown = 0.8;

let input = { dx: 0, dy: 0 };
let ping = 0;

function getPlayerColor(id, isMe, serverColor) {
    if (isMe) return "#88ff88";
    if (serverColor) return serverColor;
    let hash = 0;
    for (let i = 0; i < id.length; i++) {
        hash = ((hash << 5) - hash) + id.charCodeAt(i);
        hash |= 0;
    }
    const hue = Math.abs(hash % 360);
    return `hsl(${hue}, 70%, 55%)`;
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const ws = new WebSocket(location.origin.replace("http", "ws"));

ws.onmessage = (msg) => {
    const data = JSON.parse(msg.data);
    
    if (data.type === 'init') {
        myId = data.id;
    }
    else if (data.type === 'state') {
        serverPlayers = data.players;
        zone = data.zone;
        aliveCount = data.aliveCount;
        
        if (myId && serverPlayers[myId]) {
            localPlayerHealth = serverPlayers[myId].health;
            const percent = Math.max(0, (localPlayerHealth / 100) * 100);
            document.getElementById('healthBar').style.width = percent + '%';
            document.getElementById('healthText').innerText = `${Math.floor(localPlayerHealth)} HP`;
            lastAttackTime = serverPlayers[myId].lastAttackTime;
        }
        document.getElementById('aliveCount').innerText = aliveCount;
        
        if (data.timestamp) {
            ping = Date.now() - data.timestamp;
            document.getElementById('pingValue').innerText = ping;
        }
    }
    else if (data.type === 'damage') {
        if (data.target === myId) {
            showDamageNumber(data.damage, true);
            if (data.killed) {
                setTimeout(() => alert("💀 Has muerto! La isla te ha vencido."), 100);
            }
        } else if (data.from === myId) {
            showDamageNumber(data.damage, false, data.target);
        }
    }
};

function showDamageNumber(damage, isMe, targetId) {
    const div = document.createElement('div');
    div.className = 'damageNumber';
    div.textContent = `-${damage}`;
    div.style.color = isMe ? '#ff8888' : '#ffaa44';
    div.style.left = (isMe ? canvas.width/2 : canvas.width/2 + (Math.random() - 0.5) * 100) + 'px';
    div.style.top = (isMe ? canvas.height/2 : canvas.height/2 + (Math.random() - 0.5) * 80) + 'px';
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 800);
}

// Controles
document.addEventListener("keydown", (e) => {
    if (e.key === "w") input.dy = -1;
    if (e.key === "s") input.dy = 1;
    if (e.key === "a") input.dx = -1;
    if (e.key === "d") input.dx = 1;
});
document.addEventListener("keyup", (e) => {
    if (["w","s"].includes(e.key)) input.dy = 0;
    if (["a","d"].includes(e.key)) input.dx = 0;
});

let startX = 0, startY = 0;
canvas.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
});
canvas.addEventListener("touchmove", (e) => {
    let dx = e.touches[0].clientX - startX;
    let dy = e.touches[0].clientY - startY;
    let mag = Math.hypot(dx, dy) || 1;
    input.dx = dx / mag;
    input.dy = dy / mag;
});
canvas.addEventListener("touchend", () => {
    input.dx = 0;
    input.dy = 0;
});

// Envío de input al servidor cada 30ms
setInterval(() => {
    if (ws.readyState === 1 && myId) {
        ws.send(JSON.stringify({ type: "move", dx: input.dx, dy: input.dy }));
    }
}, 30);

// Interpolación con factor más alto para reducir retraso (0.7 en lugar de 0.4)
function interpolateAll() {
    for (let id in serverPlayers) {
        const sp = serverPlayers[id];
        if (!players[id]) {
            players[id] = { ...sp };
        } else {
            // Factor 0.7 → más reactivo, pero aún suave
            players[id].x += (sp.x - players[id].x) * 0.7;
            players[id].y += (sp.y - players[id].y) * 0.7;
            players[id].health = sp.health;
            players[id].color = sp.color;
            players[id].alive = sp.alive;
            players[id].lastAttackTime = sp.lastAttackTime;
        }
    }
}

function drawGround(camX, camY) {
    ctx.fillStyle = "#e0b05a";
    ctx.fillRect(camX, camY, canvas.width, canvas.height);
    
    const gridSpacing = 80;
    const startX = Math.floor(camX / gridSpacing) * gridSpacing;
    const startY = Math.floor(camY / gridSpacing) * gridSpacing;
    
    ctx.fillStyle = "#c99a3a";
    for (let x = startX; x < camX + canvas.width + gridSpacing; x += gridSpacing) {
        for (let y = startY; y < camY + canvas.height + gridSpacing; y += gridSpacing) {
            ctx.beginPath();
            ctx.arc(x, y, 2.5, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const localPlayer = players[myId];
    if (!localPlayer) return;
    
    let camX = localPlayer.x - canvas.width / 2;
    let camY = localPlayer.y - canvas.height / 2;
    
    ctx.save();
    ctx.translate(-camX, -camY);
    
    drawGround(camX, camY);
    
    // Zona segura
    ctx.beginPath();
    ctx.arc(zone.x, zone.y, zone.radius, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(0, 150, 200, 0.25)";
    ctx.fill();
    ctx.strokeStyle = "rgba(0, 200, 255, 0.9)";
    ctx.lineWidth = 4;
    ctx.stroke();
    
    ctx.beginPath();
    ctx.arc(zone.x, zone.y, zone.radius + 5, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(255, 0, 0, 0.4)";
    ctx.stroke();
    
    // Dibujar todos los jugadores
    for (let id in players) {
        const p = players[id];
        if (!p.alive) continue;
        const isMe = (id === myId);
        const radius = 14;
        ctx.shadowBlur = 8;
        ctx.shadowColor = "rgba(0,0,0,0.5)";
        ctx.beginPath();
        ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = getPlayerColor(id, isMe, p.color);
        ctx.fill();
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Barra de vida
        const healthPercent = p.health / 100;
        const barWidth = 30;
        const barHeight = 6;
        const barX = p.x - barWidth / 2;
        const barY = p.y - radius - 10;
        ctx.fillStyle = "#333";
        ctx.fillRect(barX, barY, barWidth, barHeight);
        ctx.fillStyle = "#ff3333";
        ctx.fillRect(barX, barY, barWidth * healthPercent, barHeight);
        
        ctx.shadowBlur = 0;
        ctx.font = "12px Arial";
        ctx.fillStyle = "white";
        ctx.fillText(isMe ? "Tú" : `P${id.substring(0,4)}`, p.x - 12, p.y - radius - 12);
        
        // Cooldown local
        if (isMe && lastAttackTime) {
            const now = Date.now() / 1000;
            const cooldownRemaining = Math.max(0, attackCooldown - (now - lastAttackTime));
            if (cooldownRemaining > 0) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, radius + 3, 0, Math.PI * 2 * (1 - cooldownRemaining / attackCooldown));
                ctx.strokeStyle = "#ffaa44";
                ctx.lineWidth = 3;
                ctx.stroke();
            }
        }
    }
    
    ctx.restore();
    
    ctx.font = "bold 14px monospace";
    ctx.fillStyle = "white";
    ctx.shadowBlur = 2;
    ctx.fillText(`🌊 Zona segura: ${Math.floor(zone.radius)}m`, 20, 70);
    if (zone.radius < 300) {
        ctx.fillStyle = "#ff8888";
        ctx.fillText("⚠️ LA ISLA SE HUNDE RÁPIDO ⚠️", 20, 100);
    }
}

function gameLoop() {
    requestAnimationFrame(gameLoop);
    interpolateAll();
    draw();
}
gameLoop();
</script>
</body>
</html>

});
