<script>

// ========== VARIABLES GLOBALES ==========
let myId = null;
let players = {};
let serverPlayers = {};
let zone = { x: 800, y: 800, radius: 700 };
let aliveCount = 0;
let localPlayerHealth = 100;
let lastAttackTime = 0;
let attackCooldown = 0.8;

let input = { dx: 0, dy: 0 };
let deathTime = null;

let pingHistory = [];
const PING_HISTORY_LEN = 5;

// ========== CONFIGURACIÓN DEL SPRITE ==========
const SPRITE_URL = "ch003.png";
const TOTAL_IMAGE_SIZE = 128;
const TILES_PER_ROW = 4;
const TILE_SIZE = TOTAL_IMAGE_SIZE / TILES_PER_ROW;
const SPRITE_SCALE = 48 / TILE_SIZE;
const SPRITE_W = TILE_SIZE * SPRITE_SCALE;
const SPRITE_H = TILE_SIZE * SPRITE_SCALE;
const CROP_LEFT = 0;
const CROP_TOP = 0;
const CROP_WIDTH = TILE_SIZE - CROP_LEFT;
const CROP_HEIGHT = TILE_SIZE - CROP_TOP;

let spriteSheet = new Image();
let spriteLoaded = false;
spriteSheet.onload = () => { spriteLoaded = true; };
spriteSheet.src = SPRITE_URL;

const DIRECTION_TO_ROW = {
    down: 0,
    up: 1,
    left: 2,
    right: 3
};

let animInterval = 0.25;
const slider = document.getElementById('animSpeedSlider');
const speedValue = document.getElementById('animSpeedValue');
slider.addEventListener('input', (e) => {
    animInterval = parseFloat(e.target.value);
    speedValue.innerText = animInterval.toFixed(2) + ' s';
});

let playerAnim = {};

const currentFrameSpan = document.getElementById('currentFrame');
const timeToNextSpan = document.getElementById('timeToNext');

// ========== FUNCIONES AUXILIARES (iguales) ==========
function getPlayerColor(id, isMe, serverColor) { /* ... */ }
function resize() { /* ... */ }

// ========== CONTROLES (iguales) ==========
document.addEventListener("keydown", (e) => {
    if (e.key === "w") input.dy = -1;
    if (e.key === "s") input.dy = 1;
    if (e.key === "a") input.dx = -1;
    if (e.key === "d") input.dx = 1;
});
document.addEventListener("keyup", (e) => {
    if (["w","s"].includes(e.key)) input.dy = 0;
    if (["a","d"].includes(e.key)) input.dx = 0;
});
// (touch events iguales)
let startX = 0, startY = 0;
canvas.addEventListener("touchstart", (e) => { /* ... */ });
canvas.addEventListener("touchmove", (e) => { /* ... */ });
canvas.addEventListener("touchend", () => { /* ... */ });

setInterval(() => {
    if (ws.readyState === 1 && myId) {
        ws.send(JSON.stringify({ type: "move", dx: input.dx, dy: input.dy }));
    }
}, 30);

// ========== INTERPOLACIÓN Y ANIMACIÓN (con dirección visual para todos) ==========
function interpolateAll() {
    for (let id in serverPlayers) {
        const sp = serverPlayers[id];
        if (!players[id]) {
            players[id] = { ...sp };
            playerAnim[id] = {
                frame: 1,
                directionRow: 0,
                moving: false,
                lastVisualX: sp.x,
                lastVisualY: sp.y,
                nextFrameTime: performance.now() / 1000 + animInterval
            };
        } else {
            players[id].x += (sp.x - players[id].x) * 0.7;
            players[id].y += (sp.y - players[id].y) * 0.7;
            players[id].health = sp.health;
            players[id].color = sp.color;
            players[id].alive = sp.alive;
            players[id].lastAttackTime = sp.lastAttackTime;
        }
    }
}

function getDirectionFromMovement(dx, dy) {
    if (Math.abs(dx) > Math.abs(dy)) {
        return dx > 0 ? 'right' : 'left';
    } else if (Math.abs(dy) > 0) {
        return dy > 0 ? 'down' : 'up';
    }
    return null;
}

function updateAnimations() {
    const now = performance.now() / 1000;
    for (let id in players) {
        const p = players[id];
        if (!p.alive) continue;

        const anim = playerAnim[id];
        if (!anim) continue;

        // Para TODOS los jugadores (incluido el local), usamos desplazamiento visual
        const deltaX = p.x - anim.lastVisualX;
        const deltaY = p.y - anim.lastVisualY;
        const distance = Math.hypot(deltaX, deltaY);
        
        let moving = distance > 0.5;
        let direction = moving ? getDirectionFromMovement(deltaX, deltaY) : null;

        // Actualizar última posición visual para la próxima iteración
        anim.lastVisualX = p.x;
        anim.lastVisualY = p.y;

        if (moving && direction) {
            const newRow = DIRECTION_TO_ROW[direction];
            if (anim.directionRow !== newRow) {
                // Cambio de dirección: reiniciar frame a 0, programar próximo cambio
                anim.directionRow = newRow;
                anim.frame = 0;
                anim.nextFrameTime = now + animInterval;
                if (id === myId) console.log(`Dirección visual cambió a ${direction}, frame=0`);
            } else {
                // Misma dirección: si es hora de cambiar frame
                if (now >= anim.nextFrameTime) {
                    anim.frame = (anim.frame + 1) % 4;
                    anim.nextFrameTime = now + animInterval;
                    if (id === myId) console.log(`Frame cambiado a ${anim.frame}`);
                }
            }
            anim.moving = true;
        } else {
            // Quieto: mostrar frame 1 (quieto) pero no tocar el temporizador
            anim.frame = 1;
            anim.moving = false;
            // No modificamos nextFrameTime
        }

        // Actualizar debug para jugador local
        if (id === myId) {
            currentFrameSpan.innerText = anim.frame;
            const timeLeft = Math.max(0, anim.nextFrameTime - now);
            timeToNextSpan.innerText = timeLeft.toFixed(2);
        }
    }
}

// ========== DIBUJADO (igual) ==========
function drawGround(camX, camY) { /* ... */ }
function draw() { /* ... */ }
function updateRespawnMessage() { /* ... */ }

function gameLoop() {
    requestAnimationFrame(gameLoop);
    interpolateAll();
    updateAnimations();
    draw();
    updateRespawnMessage();
}
gameLoop();
</script>
